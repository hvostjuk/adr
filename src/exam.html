<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADR</title>
    <link rel="stylesheet" href="assets/css/exam.min.css">
</head>
<body>
    <div class="adr">
        <ul class="adr__questions questions">
            <li class="questions__item">1</li>
            <li class="questions__item">2</li>
            <li class="questions__item">3</li>
            <li class="questions__item">4</li>
            <li class="questions__item">5</li>
            <li class="questions__item">6</li>
            <li class="questions__item">7</li>
            <li class="questions__item">8</li>
            <li class="questions__item">9</li>
            <li class="questions__item">10</li>
            <li class="questions__item">11</li>
            <li class="questions__item">12</li>
            <li class="questions__item">13</li>
            <li class="questions__item">14</li>
            <li class="questions__item">15</li>
            <li class="questions__item">16</li>
            <li class="questions__item">17</li>
            <li class="questions__item">18</li>
            <li class="questions__item">19</li>
            <li class="questions__item">20</li>
            <li class="questions__item">21</li>
            <li class="questions__item">22</li>
            <li class="questions__item">23</li>
            <li class="questions__item">24</li>
            <li class="questions__item">25</li>
        </ul>
        <div class="adr__wrapper">
            <div class="adr__img-wrap">
                <img class="adr__img" src="" alt="">
            </div>
            <p class="adr__question"></p>
            <ul class="adr__answers answers">
                <li class="answers__item">
                    <input class="answers__input" type="radio" >
                    <span class="answers__span">a.</span>
                    <p class="answers__text"></p>
                </li>
                <li class="answers__item">
                    <input class="answers__input" type="radio" >
                    <span class="answers__span">b.</span>
                    <p class="answers__text"></p>
                </li>
                <li class="answers__item">
                    <input class="answers__input" type="radio" >
                    <span class="answers__span">c.</span>
                    <p class="answers__text"></p>
                </li>
            </ul>
        </div>
    </div>
<script src="./assets/js/main.min.js"></script>
</body>
</html>
