<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADR 25 вопросов(базовый курс)</title>
    <link rel="stylesheet" href="pages-styles.css">
</head>
<body>
<div class="inner">
    <div class="content">
        <div class="content__img-wrap">
            <img class="content__img" src="" alt="">
        </div>
        <p class="content__question"></p>
        <div class="content__answers">
            <div class="answer">
                <input type="radio" class="answer__input" name="answer" id="a"><span>a.</span>
                <p class="answer__option"></p>
            </div>
            <div class="answer">
                <input type="radio" class="answer__input" name="answer" id="b"><span>b.</span>
                <p class="answer__option"></p>
            </div>
            <div class="answer">
                <input type="radio" class="answer__input" name="answer" id="c"><span>c.</span>
                <p class="answer__option"></p>
            </div>
        </div>
        <div class="content__btns">
            <button class="answer__btn btn">Проверить ответ!</button>
            <button class="next_question btn">Следующий вопрос</button>
        </div>

    </div>
</div>
<span class="check"></span>
<script src="../DB.js"></script>
<script src="random-all-base.js"></script>
</body>
</html>
